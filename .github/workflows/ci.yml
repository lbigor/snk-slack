name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  java:
    name: Java — pacote, HTTP client, compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validar pacote br.com.lbi.slack em todos os .java
        run: |
          set -e
          mismatch=$(grep -l -r "^package " src/ | while read -r f; do
            grep -q "^package br.com.lbi.slack;" "$f" || echo "$f"
          done)
          if [ -n "$mismatch" ]; then
            echo "Arquivos com pacote errado:"
            echo "$mismatch"
            exit 1
          fi

      - name: Validar ausencia de HTTP clients externos
        run: |
          if grep -rE "okhttp3|com\.squareup|org\.apache\.http|retrofit" src/; then
            echo "HTTP client externo encontrado. Use apenas java.net.HttpURLConnection."
            exit 1
          fi

      - name: Compile check
        run: |
          bash test.sh

  md:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: '**/*.md'
